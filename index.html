<script>
// ─── AUTH ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://wtrbvgqxgcfjacqcndmb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0cmJ2Z3F4Z2NmamFjcWNuZG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4MTg4NjcsImV4cCI6MjA2OTM5NDg2N30.8PB0OjF2vvCtCCDnYCeemMSyvR51E2SAHe7slS1UyQU';
let currentSession = null;
let currentVendorName = null;

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errDiv = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errDiv.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await resp.json();
    if (!resp.ok || !data.access_token) throw new Error(data.error_description || data.msg || 'Credenciais inválidas');
    currentSession = data;
    const vendorResp = await fetch(SUPABASE_URL + '/rest/v1/vendors?auth_id=eq.' + data.user.id + '&select=name&is_active=eq.true', {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + data.access_token }
    });
    const vendors = await vendorResp.json();
    currentVendorName = vendors?.[0]?.name || email.split('@')[0];
    document.getElementById('user-name').textContent = '👤 ' + currentVendorName;
    document.getElementById('login-overlay').style.display = 'none';
    sessionStorage.setItem('prospmini_session', JSON.stringify({ token: data.access_token, vendor: currentVendorName, userId: data.user.id }));
  } catch (e) {
    errDiv.textContent = e.message; errDiv.classList.remove('hidden');
  } finally { btn.disabled = false; btn.textContent = 'Entrar'; }
}

function doLogout() {
  currentSession = null; currentVendorName = null;
  sessionStorage.removeItem('prospmini_session');
  document.getElementById('login-overlay').style.display = 'flex';
}

function checkAuth() {
  const saved = sessionStorage.getItem('prospmini_session');
  if (saved) {
    const s = JSON.parse(saved);
    currentSession = s; currentVendorName = s.vendor;
    document.getElementById('user-name').textContent = '👤 ' + s.vendor;
    document.getElementById('login-overlay').style.display = 'none';
  }
}
checkAuth();

// ─── ESTADO GLOBAL ────────────────────────────────────────────────────────────
let enrichedContacts = JSON.parse(localStorage.getItem('enriched_contacts') || '{}');
let crmSentContacts  = JSON.parse(localStorage.getItem('crm_sent_contacts')  || '{}');
let currentPage  = 1;
let totalPages   = 1;
let totalResults = 0;
let currentFilters = {};

// ─── BÚSQUEDA ─────────────────────────────────────────────────────────────────
async function searchCompanies(page = 1) {
  const btn       = document.getElementById('search-btn');
  const container = document.getElementById('results-container');

  btn.disabled = true;
  btn.innerHTML = '🔄 Buscando...';
  currentPage = page;

  const industryValue = document.getElementById('industry-filter').value;
  currentFilters = {
    city:     document.getElementById('city-filter').value,
    size:     document.getElementById('size-filter').value,
    keywords: industryValue ? [industryValue] : []
  };

  try {
    const response = await fetch('/api/1-search-small-companies', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filters: currentFilters, page })
    });

    const data = await response.json();

    if (data.success) {
      document.getElementById('apollo-credits').textContent = data.apollo_credits_used || 0;
      totalPages   = data.total_pages || 1;
      totalResults = data.total      || 0;
      renderCompanies(data.organizations);
      updatePagination();
    } else {
      alert('Erro na busca: ' + data.error);
    }
  } catch (error) {
    console.error('Search error:', error);
    alert('Erro na busca. Verifique o console.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🚀 Buscar Empresas';
  }
}

// ─── PAGINACIÓN ───────────────────────────────────────────────────────────────
function updatePagination() {
  const paginationInfo   = document.getElementById('pagination-info');
  const paginationBottom = document.getElementById('pagination-bottom');

  if (totalPages > 1) {
    paginationInfo.classList.remove('hidden');
    paginationBottom.classList.remove('hidden');

    document.getElementById('current-page').textContent        = currentPage;
    document.getElementById('total-pages').textContent         = totalPages;
    document.getElementById('current-page-bottom').textContent = currentPage;
    document.getElementById('total-pages-bottom').textContent  = totalPages;
    document.getElementById('total-results').textContent       = totalResults;

    const prevBtns = [document.getElementById('prev-btn'), document.getElementById('prev-btn-bottom')];
    const nextBtns = [document.getElementById('next-btn'), document.getElementById('next-btn-bottom')];
    prevBtns.forEach(b => b.disabled = currentPage === 1);
    nextBtns.forEach(b => b.disabled = currentPage >= totalPages);
  } else {
    paginationInfo.classList.add('hidden');
    paginationBottom.classList.add('hidden');
  }
}

function previousPage() {
  if (currentPage > 1) {
    searchCompanies(currentPage - 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function nextPage() {
  if (currentPage < totalPages) {
    searchCompanies(currentPage + 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ─── RENDER EMPRESAS ──────────────────────────────────────────────────────────
function renderCompanies(companies) {
  const container = document.getElementById('results-container');

  if (!companies || companies.length === 0) {
    container.innerHTML = `
      <div class="text-center py-16">
        <div class="text-6xl mb-4">🔍</div>
        <h3 class="text-xl font-semibold mb-2">Nenhuma empresa encontrada</h3>
        <p class="text-gray-600">Ajuste os filtros e tente novamente</p>
      </div>`;
    return;
  }

  container.innerHTML = `
    <h2 class="text-xl font-bold mb-4">📊 ${companies.length} empresas nesta página</h2>
    <div class="space-y-6">
      ${companies.map(company => renderCompany(company)).join('')}
    </div>`;

  // Restaurar estado de botones CRM ya enviados
  restoreCRMButtonStates();
  updateCRMCounter();
}

// ─── RENDER EMPRESA ───────────────────────────────────────────────────────────

  if (company.instagram) socialLinks.push(`<a href="${company.instagram}" target="_blank" class="text-blue-100 hover:text-white underline">📸 Instagram</a>`);
  if (company.facebook)  socialLinks.push(`<a href="${company.facebook}"  target="_blank" class="text-blue-100 hover:text-white underline">👥 Facebook</a>`);

  return `

              ${company.industry  ? `<span>🏭 ${company.industry}</span>`            : ''}
            </div>
            ${company.phone ? `<div class="mb-2">📞 ${company.phone}</div>` : ''}
            ${socialLinks.length > 0 ? `
              <div class="flex gap-3 text-sm flex-wrap">
                ${socialLinks.join(' • ')}
              </div>` : ''}
          </div>
          ${company.website ? `
            <a href="${company.website}" target="_blank"

              🌐 Visitar Site
            </a>` : ''}

      <div class="p-6">

}

// ─── RENDER CONTACTO ──────────────────────────────────────────────────────────
function renderContact(contact, company) {
  const isEnriched    = enrichedContacts[contact.id];

          <p class="text-sm text-gray-600 mb-2">${contact.title || ''}</p>

            : `<button id="crm-btn-${contact.id}"

// ─── ENRICH LUSHA (sin cambios respecto al original) ─────────────────────────
async function enrichContact(contact, companyName) {
  if (!contact.linkedin_url) {
    alert('❌ Precisa de LinkedIn URL para enriquecer');
    return;
  }
  if (!confirm(`Usar 1 crédito Lusha para enriquecer ${contact.name}?`)) return;

  try {
    const response = await fetch('/api/2-enrich-contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contact: { id: contact.id, name: contact.name, company: companyName, linkedin_url: contact.linkedin_url }
      })
    });

    const data = await response.json();

    if (data.success) {
      enrichedContacts[contact.id] = {
        emails: data.enriched_data.emails || [],
        phones: data.enriched_data.phones || [],
        enriched: true
      };
      localStorage.setItem('enriched_contacts', JSON.stringify(enrichedContacts));

      const cur = parseInt(document.getElementById('lusha-credits').textContent);
      document.getElementById('lusha-credits').textContent = cur + 1;

      const emailsText = data.enriched_data.emails?.join('\n') || 'Nenhum';
      const phonesText = data.enriched_data.phones?.join('\n') || 'Nenhum';
      alert(`✅ Contato enriquecido!\n\nEmails:\n${emailsText}\n\nTelefones:\n${phonesText}`);
      searchCompanies(currentPage);
    } else {
      alert('❌ Falha: ' + data.error);
    }
  } catch (error) {
    console.error('Enrichment error:', error);
    alert('Erro ao enriquecer contato');
  }
}

// ─── ENVIAR PARA CADÊNCIA ────────────────────────────────────────────────────
async function sendToCadencia(contact, companyPartial) {
  if (!currentVendorName) { alert('❌ Faça login primeiro.'); return; }
  const btnId = `crm-btn-${contact.id}`;
  const btn   = document.getElementById(btnId);
  if (!btn) return;

  // Enriquecer contact con datos de Lusha si están disponibles
  const lushaData = enrichedContacts[contact.id];
  if (lushaData) {
    contact = {
      ...contact,
      all_emails: lushaData.emails || [],
      all_phones: (lushaData.phones || []).map(p => ({ number: p, type: 'unknown', source: 'Lusha' }))
    };
  }

  btn.disabled  = true;
  btn.innerHTML = '⏳ Enviando...';
  btn.className = 'bg-gray-400 text-white px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap cursor-not-allowed transition-all';

  try {
    const saved = JSON.parse(sessionStorage.getItem('prospmini_session') || '{}');
    const response = await fetch('/api/6-send-to-cadencia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company: companyPartial,
        contact,
        vendor_name: currentVendorName,
        vendor_auth_id: saved.userId,
        source: 'prospmini'
      })
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      throw new Error(data.error || 'Erro desconhecido');
    }

    let title = `Lead #${data.lead.id} na Cadência`;
    if (data.collision) title += ` | ⚠️ ${data.collision.taken_by} já prospecta esta empresa`;

    btn.innerHTML = '✅ Na Cadência!';
    btn.className = 'bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap cursor-not-allowed transition-all';
    btn.title = title;

    // Persistir en localStorage
    crmSentContacts[contact.id] = {
      opportunityId: data.lead.id,
      sentAt: new Date().toISOString(),
    };
    localStorage.setItem('crm_sent_contacts', JSON.stringify(crmSentContacts));
    updateCRMCounter();

  } catch (error) {
    console.error('Erro ao enviar para Cadência:', error);
    btn.disabled  = false;
    btn.innerHTML = '❌ Tentar novamente';
    btn.className = 'bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all';
    btn.title     = error.message;
  }
}

// ─── HELPERS CRM ─────────────────────────────────────────────────────────────

// Restaurar estado visual de botones ya enviados (tras re-render)
function restoreCRMButtonStates() {
  crmSentContacts = JSON.parse(localStorage.getItem('crm_sent_contacts') || '{}');
  Object.entries(crmSentContacts).forEach(([contactId, data]) => {
    const btn = document.getElementById(`crm-btn-${contactId}`);
    if (btn) {
      btn.disabled  = true;
      btn.innerHTML = '✅ Enviado!';
      btn.className = 'bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap cursor-not-allowed transition-all';
      btn.title     = `Oportunidade #${data.opportunityId} | ${new Date(data.sentAt).toLocaleDateString('pt-BR')}`;
    }
  });
}

// Actualizar contador del header
function updateCRMCounter() {
  const count = Object.keys(JSON.parse(localStorage.getItem('crm_sent_contacts') || '{}')).length;
  document.getElementById('crm-sent-count').textContent = count;
}

// Inicializar contador al cargar
updateCRMCounter();
</script>
